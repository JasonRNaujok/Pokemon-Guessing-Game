<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokémon Guessing Game</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loadingScreen">
  Please wait, the Pokédex is receiving all available Pokémon data...
</div>

<div id="menuScreen" class="centered hidden">
  <h1>Pokémon Guessing Game</h1>

  <label><input type="checkbox" id="hardMode"> Hard Mode (2x Score)</label>

  <h3>Practice Generations</h3>
  <div id="genFilters">
    <label><input type="checkbox" value="1" checked> Gen1</label>
    <label><input type="checkbox" value="2" checked> Gen2</label>
    <label><input type="checkbox" value="3" checked> Gen3</label>
    <label><input type="checkbox" value="4" checked> Gen4</label>
    <label><input type="checkbox" value="5" checked> Gen5</label>
    <label><input type="checkbox" value="6" checked> Gen6</label>
    <label><input type="checkbox" value="7" checked> Gen7</label>
    <label><input type="checkbox" value="8" checked> Gen8</label>
    <label><input type="checkbox" value="9" checked> Gen9</label>
  </div>

  <br>

  <button onclick="startGame('practice')">Practice Mode</button>
  <button onclick="startGame('daily')">Daily Mode</button>
  <button onclick="openCollection()">Collection</button>
  <button onclick="showLeaderboard()">Leaderboard</button>

  <br><br>

  <button id="musicBtn" onclick="toggleMusic()">Music</button>
  <button id="sfxBtn" onclick="toggleSFX(true)">SFX</button>
</div>

<div id="gameScreen" class="card hidden">

  <button onclick="goToMenu()">⬅ Back</button>

  <h2 id="dailyCounter"></h2>

  <p>Score: <span id="score">0</span></p>
  <p>Dex #: <span id="dex"></span></p>

  <img id="pokemonImage">

  <div id="info"></div>

  <input list="pokemonList" id="guessInput">
  <datalist id="pokemonList"></datalist>

  <button onclick="checkGuess()">Guess</button>
  <button onclick="giveHint()">Hint</button>
  <button onclick="nextPokemon()">Skip</button>

  <button onclick="toggleMusic()">Music</button>
  <button onclick="toggleSFX()">SFX</button>

  <p id="result"></p>
</div>

<div id="collectionScreen" class="hidden">
  <div class="stickyHeader">
    <button onclick="closeCollection()">⬅ Back</button>
  </div>
  <div id="collectionGrid"></div>
</div>

<div id="leaderboardScreen" class="hidden">
  <div class="stickyHeader">
    <button onclick="closeLeaderboard()">⬅ Back</button>
  </div>
  <div id="leaderboardList"></div>
</div>

<div id="shinyPopup" class="hidden">✨ SHINY CAUGHT! ✨</div>

<script src="app.js"></script>
</body>
</html>
